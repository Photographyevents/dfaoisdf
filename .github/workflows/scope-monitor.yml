name: RedBull Recon Monitor

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Cache Go binaries
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-bins-${{ runner.os }}-redbull-v1

      - name: Install httpx
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: |
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-requests-v1

      - name: Install Python deps
        run: pip install requests

      - name: Run monitor and trigger scans
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # Run the python script
          python monitor.py
          
          # Configure Git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. ALWAYS commit state changes (even if no live hosts were found)
          if git diff --name-only | grep -q "scope_state.txt"; then
            echo "State changed. Committing scope_state.txt..."
            git add scope_state.txt initial_scan_done.flag || true
            git commit -m "Update scope state (routine sync) [skip ci]" || true
            git pull --rebase origin main || true
            git push || true
          else
            echo "No changes to scope_state.txt."
          fi

          # 2. Trigger scans ONLY if new live hosts were written to new_host.txt
          if [ -f new_host.txt ] && [ -s new_host.txt ]; then
            echo "🚀 New live hosts found! Committing scan targets and triggering workflows..."
            
            # Commit the target files and lock
            touch scan_lock.txt
            git add new_host.txt fuzz_targets.txt pending_assets.txt scan_lock.txt || true
            git commit -m "Add new live hosts and create scan lock" || true
            git pull --rebase origin main || true
            git push || true

            # Trigger Nuclei
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/nuclei-scan.yml/dispatches" \
              -d '{"ref":"main","inputs":{"targets_file":"new_host.txt","severity":"low,medium,high,critical","chunk_size":"100"}}'

            # Trigger Naabu
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/naabu-scan.yml/dispatches" \
              -d '{"ref":"main","inputs":{"ips_file":"new_host.txt"}}'

            # Trigger Fuzzing (if targets exist)
            if [ -f fuzz_targets.txt ] && [ -s fuzz_targets.txt ]; then
              echo "🎯 Triggering Fuzz scan..."
              curl -s -X POST \
                -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/fuzz-scan.yml/dispatches" \
                -d '{"ref":"main","inputs":{"targets_file":"fuzz_targets.txt"}}'
            fi
          fi
